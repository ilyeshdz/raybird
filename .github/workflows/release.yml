name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: raybird-linux
            asset_name: raybird-linux-amd64
          - os: macos-latest
            artifact_name: raybird-macos
            asset_name: raybird-macos-amd64
          - os: windows-latest
            artifact_name: raybird-windows
            asset_name: raybird-windows-amd64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake libglfw3-dev libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libxfixes-dev

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake glfw

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install cmake

    - name: Build raylib (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build
        cd build
        cmake .. -DBUILD_SHARED_LIBS=OFF -DBUILD_EXAMPLES=OFF
        cmake --build . --config Release
        sudo cmake --install . --config Release

    - name: Build raylib (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build
        cd build
        cmake .. -DBUILD_SHARED_LIBS=OFF -DBUILD_EXAMPLES=OFF -DPLATFORM=Desktop -DOPENGL_VERSION=3.3
        cmake --build . --config Release
        sudo cmake --install . --config Release

    - name: Build raylib (Windows)
      if: runner.os == 'Windows'
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=OFF -DBUILD_EXAMPLES=OFF -DCMAKE_INSTALL_PREFIX=../install
        cmake --build . --config Release
        cmake --install . --config Release
        echo "CMAKE_PREFIX_PATH=$env:GITHUB_WORKSPACE\raylib\install" >> $env:GITHUB_ENV

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Create archive (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cd build/bin
        tar czf ../../${{ matrix.artifact_name }}.tar.gz raybird

    - name: Create archive (Windows)
      if: runner.os == 'Windows'
      run: |
        cd build/bin/Release
        7z a ../../../${{ matrix.artifact_name }}.zip raybird.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          ${{ matrix.artifact_name }}.tar.gz
          ${{ matrix.artifact_name }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/raybird-linux/raybird-linux.tar.gz
          artifacts/raybird-macos/raybird-macos.tar.gz
          artifacts/raybird-windows/raybird-windows.zip
        generate_release_notes: true
